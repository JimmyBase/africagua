[build]
publish = "dist"
command = "npx vite build"

[build.environment]
NODE_VERSION = "18"
# Disable smart detection for Firebase API keys (they are public by design)
SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/sitemap.xml"

[headers.values]
Content-Type = "application/xml"

[[headers]]
for = "/robots.txt"

[headers.values]
Content-Type = "text/plain"